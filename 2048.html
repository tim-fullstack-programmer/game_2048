
<!DOCTYPE html>
<html lang="en">
<head>
    <title>2048</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #D3D3D3;
            padding: 15px;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .header {
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 20px;
            padding: 18px 24px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .header a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid black;
            border-radius: 10px;
            padding: 6px 14px;
            background: #90ccf7;
            font-size: 0.85rem;
        }
        .score-panel {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        .score-box {
            flex: 1;
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 15px;
            padding: 12px;
            text-align: center;
        }
        .score-box .label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .score-box .value {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
        }
        .btn:hover {
            background: #90e050;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
        }
        .grid-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 16px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
        }
        .grid-cell {
            background: rgba(255,255,255,0.3);
            border: 2px solid black;
            border-radius: 10px;
        }
        .tile-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 8px;
            pointer-events: none;
        }
        .tile {
            position: absolute;
            width: calc(25% - 10px);
            height: calc(25% - 10px);
            border: 2px solid black;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.6rem;
            transition: transform 0.15s ease-in-out, background-color 0.15s;
            z-index: 10;
        }
        .tile.new-tile {
            animation: popIn 0.2s ease-out;
        }
        .tile.merged {
            animation: mergePop 0.2s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes mergePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .tile-2    { background: #eee4da; color: #776e65; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-4    { background: #ede0c8; color: #776e65; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-8    { background: #f2b179; color: #f9f6f2; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-16   { background: #f59563; color: #f9f6f2; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-32   { background: #f67c5f; color: #f9f6f2; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-64   { background: #f65e3b; color: #f9f6f2; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        .tile-128  { background: #edcf72; color: #f9f6f2; font-size: clamp(1rem, 4vw, 1.5rem); }
        .tile-256  { background: #edcc61; color: #f9f6f2; font-size: clamp(1rem, 4vw, 1.5rem); }
        .tile-512  { background: #edc850; color: #f9f6f2; font-size: clamp(1rem, 4vw, 1.5rem); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: clamp(0.85rem, 3.5vw, 1.3rem); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: clamp(0.85rem, 3.5vw, 1.3rem); box-shadow: 0 0 15px rgba(237,194,46,0.5); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: clamp(0.7rem, 3vw, 1.1rem); }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(167,239,103,0.85);
            border: 2px solid black;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        .overlay.show { display: flex; }
        .overlay h2 {
            font-size: 2rem;
            font-weight: bold;
        }
        .overlay p {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .overlay .btn {
            max-width: 200px;
        }

        .instructions {
            background: #90ccf7;
            border: 2px solid black;
            border-radius: 15px;
            padding: 14px 18px;
            width: 100%;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: center;
        }
        .instructions strong {
            display: block;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .touch-controls {
            display: none;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1;
            position: relative;
        }
        .touch-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #A7EF67;
            border: 2px solid black;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active { background: #90e050; transform: scale(0.95); }
        .touch-up    { top: 0; left: 50%; transform: translateX(-50%); }
        .touch-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
        .touch-left  { left: 0; top: 50%; transform: translateY(-50%); }
        .touch-right { right: 0; top: 50%; transform: translateY(-50%); }
        .touch-center {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #90ccf7;
            font-size: 1rem;
            width: 90px; height: 90px;
            border-radius: 50%;
        }

        @media (max-width: 540px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.6rem; }
            .score-box .value { font-size: 1.3rem; }
            .tile { font-size: 1.3rem; }
            .tile-128, .tile-256, .tile-512 { font-size: 1.1rem; }
            .tile-1024, .tile-2048 { font-size: 0.9rem; }
            .tile-super { font-size: 0.75rem; }
            .touch-controls { display: block; }
        }
        @media (min-width: 1600px) {
            .container { max-width: 600px; }
            .header h1 { font-size: 2.8rem; }
            .score-box .value { font-size: 2rem; }
            .tile { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <a href="index.html">← Home</a>
        </div>

        <div class="score-panel">
            <div class="score-box">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">Best</div>
                <div class="value" id="best">0</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="newGame()">New Game</button>
            <button class="btn" onclick="undoMove()" id="undo-btn" disabled>Undo</button>
        </div>

        <div class="game-wrapper" id="game-wrapper">
            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="overlay" id="overlay">
                <h2 id="overlay-title">Game Over!</h2>
                <p id="overlay-msg">No more moves available.</p>
                <button class="btn" onclick="newGame()">Try Again</button>
            </div>
        </div>

        <div class="touch-controls">
            <div class="touch-btn touch-up" ontouchstart="handleTouchBtn('up')" onmousedown="handleTouchBtn('up')">▲</div>
            <div class="touch-btn touch-left" ontouchstart="handleTouchBtn('left')" onmousedown="handleTouchBtn('left')">◀</div>
            <div class="touch-btn touch-center">SWIPE</div>
            <div class="touch-btn touch-right" ontouchstart="handleTouchBtn('right')" onmousedown="handleTouchBtn('right')">▶</div>
            <div class="touch-btn touch-down" ontouchstart="handleTouchBtn('down')" onmousedown="handleTouchBtn('down')">▼</div>
        </div>

        <div class="instructions">
            <strong>How to Play</strong>
            Use arrow keys or WASD to slide tiles. Swipe on mobile. When two tiles with the same number touch, they merge into one! Reach 2048 to win.
        </div>
    </div>

    <script>
        const GRID_SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
        let previousBoard = null;
        let previousScore = 0;
        let isAnimating = false;
        let hasWon = false;

        document.getElementById('best').textContent = bestScore;

        function initBoard() {
            board = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            hasWon = false;
            previousBoard = null;
            previousScore = 0;
            updateScore();
            hideOverlay();
            addRandomTile();
            addRandomTile();
            renderBoard();
            document.getElementById('undo-btn').disabled = true;
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return false;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            return {r, c, value: board[r][c], isNew: true};
        }

        function renderBoard() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            const cellSizePercent = 25;
            const gapPercent = 2;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const val = board[r][c];
                    if (val === 0) continue;
                    const tile = document.createElement('div');
                    tile.className = 'tile tile-' + (val <= 2048 ? val : 'super');
                    tile.textContent = val;
                    const top = r * cellSizePercent + gapPercent;
                    const left = c * cellSizePercent + gapPercent;
                    tile.style.top = top + '%';
                    tile.style.left = left + '%';
                    tile.style.width = (cellSizePercent - gapPercent * 2) + '%';
                    tile.style.height = (cellSizePercent - gapPercent * 2) + '%';
                    container.appendChild(tile);
                }
            }
        }

        function renderBoardWithAnimation(newTileInfo, mergedPositions) {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            const cellSizePercent = 25;
            const gapPercent = 2;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const val = board[r][c];
                    if (val === 0) continue;
                    const tile = document.createElement('div');
                    let cls = 'tile tile-' + (val <= 2048 ? val : 'super');
                    if (newTileInfo && newTileInfo.r === r && newTileInfo.c === c) {
                        cls += ' new-tile';
                    }
                    if (mergedPositions && mergedPositions.some(p => p.r === r && p.c === c)) {
                        cls += ' merged';
                    }
                    tile.className = cls;
                    tile.textContent = val;
                    const top = r * cellSizePercent + gapPercent;
                    const left = c * cellSizePercent + gapPercent;
                    tile.style.top = top + '%';
                    tile.style.left = left + '%';
                    tile.style.width = (cellSizePercent - gapPercent * 2) + '%';
                    tile.style.height = (cellSizePercent - gapPercent * 2) + '%';
                    container.appendChild(tile);
                }
            }
        }

        function slideRowLeft(row) {
            let filtered = row.filter(x => x !== 0);
            let merged = [];
            let mergedPositions = [];
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    merged.push(filtered[i]);
                    filtered[i + 1] = 0;
                }
            }
            filtered = filtered.filter(x => x !== 0);
            while (filtered.length < GRID_SIZE) filtered.push(0);
            return filtered;
        }

        function arraysEqual(a, b) {
            for (let i = 0; i < a.length; i++) {
                for (let j = 0; j < a[i].length; j++) {
                    if (a[i][j] !== b[i][j]) return false;
                }
            }
            return true;
        }

        function cloneBoard(b) {
            return b.map(row => [...row]);
        }

        function move(direction) {
            if (isAnimating) return;
            const oldBoard = cloneBoard(board);
            const oldScore = score;
            let moved = false;
            let mergedPositions = [];

            if (direction === 'left') {
                for (let r = 0; r < GRID_SIZE; r++) {
                    const newRow = slideRowLeft(board[r]);
                    if (!moved && !newRow.every((v, i) => v === board[r][i])) moved = true;
                    board[r] = newRow;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < GRID_SIZE; r++) {
                    const newRow = slideRowLeft(board[r].slice().reverse()).reverse();
                    if (!moved && !newRow.every((v, i) => v === board[r][i])) moved = true;
                    board[r] = newRow;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const newCol = slideRowLeft(col);
                    if (!moved && !newCol.every((v, i) => v === col[i])) moved = true;
                    for (let r = 0; r < GRID_SIZE; r++) board[r][c] = newCol[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const newCol = slideRowLeft(col.slice().reverse()).reverse();
                    if (!moved && !newCol.every((v, i) => v === col[i])) moved = true;
                    for (let r = 0; r < GRID_SIZE; r++) board[r][c] = newCol[r];
                }
            }

            if (!moved) return;

            previousBoard = oldBoard;
            previousScore = oldScore;
            document.getElementById('undo-btn').disabled = false;

            const newTile = addRandomTile();
            updateScore();
            renderBoardWithAnimation(newTile, mergedPositions);

            if (!hasWon) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (board[r][c] === 2048) {
                            hasWon = true;
                            showOverlay('You Win!', 'Congratulations! You reached 2048! Keep going for a higher score.');
                            return;
                        }
                    }
                }
            }

            if (!canMove()) {
                setTimeout(() => {
                    showOverlay('Game Over!', 'No more moves available. Your score: ' + score);
                }, 300);
            }
        }

        function canMove() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) return true;
                    if (c < GRID_SIZE - 1 && board[r][c] === board[r][c + 1]) return true;
                    if (r < GRID_SIZE - 1 && board[r][c] === board[r + 1][c]) return true;
                }
            }
            return false;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }

        function undoMove() {
            if (!previousBoard) return;
            board = cloneBoard(previousBoard);
            score = previousScore;
            updateScore();
            renderBoard();
            previousBoard = null;
            document.getElementById('undo-btn').disabled = true;
            hideOverlay();
        }

        function newGame() {
            initBoard();
        }

        function showOverlay(title, msg) {
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('overlay-msg').textContent = msg;
            document.getElementById('overlay').classList.add('show');
        }

        function hideOverlay() {
            document.getElementById('overlay').classList.remove('show');
        }

        function handleTouchBtn(dir) {
            move(dir);
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault(); move('up'); break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault(); move('down'); break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault(); move('left'); break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault(); move('right'); break;
                case 'z': case 'Z':
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault(); undoMove();
                    }
                    break;
            }
        });

        let touchStartX = 0, touchStartY = 0;
        let touchStartTime = 0;
        const gameWrapper = document.getElementById('game-wrapper');

        gameWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        gameWrapper.addEventListener('touchend', (e) => {
            if (!touchStartX && !touchStartY) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const dt = Date.now() - touchStartTime;

            const minSwipe = 30;
            const maxSwipeTime = 500;

            if (dt > maxSwipeTime) { touchStartX = touchStartY = 0; return; }

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipe) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > minSwipe) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
            touchStartX = touchStartY = 0;
        }, { passive: true });

        let mouseDown = false;
        let mouseStartX = 0, mouseStartY = 0;

        gameWrapper.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseStartX = e.clientX;
            mouseStartY = e.clientY;
            e.preventDefault();
        });

        gameWrapper.addEventListener('mouseup', (e) => {
            if (!mouseDown) return;
            mouseDown = false;
            const dx = e.clientX - mouseStartX;
            const dy = e.clientY - mouseStartY;
            const minDrag = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minDrag) move(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > minDrag) move(dy > 0 ? 'down' : 'up');
            }
        });

        gameWrapper.addEventListener('mouseleave', () => { mouseDown = false; });

        gameWrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Start
        initBoard();
    </script>
</body>
</html>
